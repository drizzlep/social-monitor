name: Daily Data Collection & Deploy

on:
  schedule:
    # Run daily at 08:00 Beijing time (00:00 UTC)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests --quiet

      - name: Run data collection
        env:
          BAIDU_API_KEY: ${{ secrets.BAIDU_API_KEY }}
        run: |
          python3 << 'PYEOF'
